<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💑 Our Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #f4f1ee;
    --card:      #ffffff;
    --border:    #e8e3dc;
    --indigo:    #5b5bd6;
    --indigo-lt: #ededfb;
    --pink:      #e05c8a;
    --pink-lt:   #fde8f1;
    --text:      #1a1a2e;
    --muted:     #8a8799;
    --success:   #2e9e6b;
    --danger:    #e05c5c;
    --teal:      #2b9e8e;
    --teal-lt:   #e0f5f3;
    --kiss:      #ff4b7b;
    --kiss-lt:   #fff0f4;
    --shadow:    0 2px 16px rgba(0,0,0,.07);
    --radius:    18px;
    --radius-sm: 10px;
    --u1: var(--indigo);
    --u1-lt: var(--indigo-lt);
    --u2: var(--pink);
    --u2-lt: var(--pink-lt);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
    overflow-x: hidden;
  }
  /* ── Topbar ── */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--text); }
  .topbar h1 span { color: var(--pink); }
  .kiss-topbar-btn {
    background: var(--kiss-lt);
    border: 1.5px solid #ffb3c8;
    color: var(--kiss);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background .15s;
  }
  .kiss-topbar-btn:hover { background: #ffdce8; }
  .june-banner {
    background: linear-gradient(135deg, #fff8f0 0%, #fde8f1 100%);
    border-bottom: 1px solid #f0dde8;
    padding: 8px 20px;
    text-align: center;
    font-size: .78rem;
    color: var(--muted);
  }
  .june-banner strong {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--pink);
    margin: 0 3px;
  }
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
  }
  @media (min-width: 700px) {
    .main { grid-template-columns: 1fr 1fr; gap: 28px; }
  }
  .user-section { display: flex; flex-direction: column; gap: 14px; }
  .profile-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--accent);
  }
  .user-section[data-user="user1"] .profile-card { --accent: var(--u1); }
  .user-section[data-user="user2"] .profile-card { --accent: var(--u2); }
  .profile-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    flex-shrink: 0;
  }
  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
  }
  .balance-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-lt);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .user-section[data-user="user1"] .balance-row { --accent-lt: var(--u1-lt); }
  .user-section[data-user="user2"] .balance-row { --accent-lt: var(--u2-lt); }
  .balance-label {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .09em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .balance-amount {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .balance-amount.negative { color: var(--danger); }
  .balance-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
  }
  .set-balance-btn {
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    padding: 5px 13px;
    font-size: .73rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .set-balance-btn:hover { background: var(--accent); color: #fff; }
  .add-balance-btn {
    background: var(--success);
    border: none;
    color: #fff;
    border-radius: 99px;
    padding: 5px 13px;
    font-size: .73rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .add-balance-btn:hover { opacity: .85; }
  .block {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px 9px;
    border-bottom: 1px solid var(--border);
  }
  .block-title {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .add-btn {
    background: var(--accent-lt);
    color: var(--accent);
    border: none;
    border-radius: 99px;
    padding: 5px 13px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-btn:hover { filter: brightness(.92); }
  .user-section[data-user="user1"] .add-btn { --accent: var(--u1); --accent-lt: var(--u1-lt); }
  .user-section[data-user="user2"] .add-btn { --accent: var(--u2); --accent-lt: var(--u2-lt); }
  .item-list { padding: 4px 0; min-height: 40px; }
  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: .82rem;
    padding: 16px 10px;
  }
  /* ── Day group ── */
  .day-group {
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .day-group:last-child { border-bottom: none; }
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .day-header:hover { background: #faf9f7; }
  .day-label {
    font-size: .78rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .day-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-total {
    font-weight: 700;
    font-size: .92rem;
    color: var(--text);
  }
  .day-chevron {
    font-size: .72rem;
    color: var(--muted);
    transition: transform .2s;
    display: inline-block;
  }
  .day-group.open .day-chevron { transform: rotate(180deg); }
  .day-items { display: none; }
  .day-group.open .day-items { display: block; }
  /* ── Expense row ── */
  .exp-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .exp-row:last-child { border-bottom: none; }
  .exp-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .user-section[data-user="user1"] .exp-dot { --accent: var(--u1); }
  .user-section[data-user="user2"] .exp-dot { --accent: var(--u2); }
  .exp-info { flex: 1; min-width: 0; }
  .exp-title { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-date { font-size: .7rem; color: var(--muted); margin-top: 1px; }
  .exp-amount { font-weight: 600; font-size: .95rem; white-space: nowrap; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: .95rem; padding: 0 2px;
    transition: color .15s; line-height: 1;
  }
  .del-btn:hover { color: var(--danger); }
  /* ── Receivable row ── */
  .recv-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .recv-row:last-child { border-bottom: none; }
  .recv-info { flex: 1; min-width: 0; }
  .recv-person { font-weight: 600; font-size: .88rem; }
  .recv-note { font-size: .7rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recv-amt { font-weight: 600; font-size: .93rem; color: var(--teal); white-space: nowrap; }
  .collect-btn {
    background: var(--teal-lt); color: var(--teal);
    border: none; border-radius: 99px;
    padding: 5px 11px; font-size: .73rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .collect-btn:hover { background: #c2ede9; }
  /* ── Debt row ── */
  .debt-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .debt-row:last-child { border-bottom: none; }
  .debt-info { flex: 1; min-width: 0; }
  .debt-person { font-weight: 600; font-size: .88rem; }
  .debt-note { font-size: .7rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .debt-amt { font-weight: 600; font-size: .93rem; color: var(--pink); white-space: nowrap; }
  .pay-btn {
    background: #e8f9f1; color: var(--success);
    border: none; border-radius: 99px;
    padding: 5px 11px; font-size: .73rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .pay-btn:hover { background: #d1f5e4; }
  .pay-btn:disabled { opacity: .5; cursor: not-allowed; }
  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,18,40,.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .18s ease;
  }
  @media (min-width: 600px) { .modal-backdrop { align-items: center; } }
  .modal {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 26px 22px 32px;
    width: 100%; max-width: 420px;
    box-shadow: 0 -8px 40px rgba(0,0,0,.12);
    animation: slideUp .22s ease;
  }
  @media (min-width: 600px) { .modal { border-radius: var(--radius); animation: fadeIn .18s ease; } }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 18px; }
  .form-group { margin-bottom: 13px; }
  .form-group label {
    display: block; font-size: .75rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 5px;
  }
  .form-group input, .form-group textarea {
    width: 100%; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: .95rem; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    transition: border-color .15s; outline: none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--modal-accent, var(--indigo)); }
  .form-group textarea { resize: none; height: 68px; }
  .form-hint { font-size: .74rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary {
    flex: 1; background: var(--modal-accent, var(--indigo));
    color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 12px; font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary {
    background: var(--bg); color: var(--muted);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 18px; font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text); color: #fff;
    padding: 10px 22px; border-radius: 99px;
    font-size: .86rem; font-weight: 500; z-index: 999;
    transition: transform .3s ease, opacity .3s;
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  /* ── Skeleton ── */
  .skeleton {
    background: linear-gradient(90deg, #ece9e4 25%, #f5f3f0 50%, #ece9e4 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px; height: 13px; margin: 8px 18px;
  }
  /* ── Kiss Bank Side Panel ── */
  .kiss-overlay {
    position: fixed; inset: 0;
    background: rgba(20,18,40,.35);
    backdrop-filter: blur(3px);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .kiss-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .kiss-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(360px, 92vw);
    background: var(--card);
    box-shadow: -8px 0 40px rgba(0,0,0,.16);
    z-index: 301;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .kiss-panel.open { transform: translateX(0); }
  .kiss-tab {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 299;
    writing-mode: vertical-rl;
    background: linear-gradient(180deg, #ff4b7b, #e05c8a);
    color: #fff;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 14px 7px;
    border-radius: 10px 0 0 10px;
    cursor: pointer;
    box-shadow: -3px 0 14px rgba(224,92,138,.35);
    transition: transform .2s;
    user-select: none;
  }
  .kiss-tab:hover { transform: translateY(-50%) translateX(-3px); }
  .kiss-tab.hidden { display: none; }
  .kiss-panel-header {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .kiss-panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--kiss);
  }
  .kiss-close-btn {
    background: #f5f3f0;
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background .15s;
  }
  .kiss-close-btn:hover { background: #ebe8e4; }
  .kiss-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  /* Kiss counter */
  .kiss-counter-card {
    background: linear-gradient(135deg, #fff0f4, #fde8f1);
    border: 1.5px solid #ffb3c8;
    border-radius: var(--radius);
    padding: 22px 20px;
    text-align: center;
  }
  .kiss-count-label {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--kiss);
    margin-bottom: 8px;
  }
  .kiss-count-display {
    font-family: 'Playfair Display', serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--kiss);
    line-height: 1;
    margin-bottom: 6px;
  }
  .kiss-count-sub {
    font-size: .75rem;
    color: #c07;
    margin-bottom: 16px;
  }
  .kiss-counter-btns {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
  }
  .kiss-adj-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid var(--kiss);
    background: #fff;
    color: var(--kiss);
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    line-height: 1;
  }
  .kiss-adj-btn:hover { background: var(--kiss); color: #fff; }
  .kiss-adj-btn:active { transform: scale(.93); }
  .kiss-set-btn {
    background: none;
    border: 1.5px solid #ffb3c8;
    color: var(--kiss);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s;
  }
  .kiss-set-btn:hover { background: #ffdce8; }
  /* Notices section */
  .kiss-section-title {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .notice-compose {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .notice-textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    font-size: .88rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    resize: none;
    height: 72px;
    outline: none;
    transition: border-color .15s;
  }
  .notice-textarea:focus { border-color: var(--kiss); }
  .notice-post-btn {
    align-self: flex-end;
    background: linear-gradient(135deg, #ff4b7b, #e05c8a);
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 7px 18px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .15s;
  }
  .notice-post-btn:hover { opacity: .88; }
  .notice-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 13px;
    background: #faf9f7;
    border-radius: var(--radius-sm);
    border: 1px solid #f0ece7;
    margin-bottom: 8px;
    animation: fadeIn .2s ease;
  }
  .notice-msg { flex: 1; font-size: .88rem; line-height: 1.5; word-break: break-word; }
  .notice-time { font-size: .68rem; color: var(--muted); margin-top: 3px; }
  .notice-del-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: .88rem; padding: 2px; flex-shrink: 0;
    transition: color .15s;
  }
  .notice-del-btn:hover { color: var(--danger); }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
</style>
</head>
<body>
<!-- ── Kiss Bank Swipe Tab ── -->
<div class="kiss-tab" id="kiss-tab" onclick="openKissPanel()">💋 Kiss Bank</div>
<!-- ── Kiss Bank Overlay + Panel ── -->
<div class="kiss-overlay" id="kiss-overlay" onclick="closeKissPanel()"></div>
<div class="kiss-panel" id="kiss-panel">
  <div class="kiss-panel-header">
    <div class="kiss-panel-title">💋 Kiss Bank</div>
    <button class="kiss-close-btn" onclick="closeKissPanel()">✕</button>
  </div>
  <div class="kiss-panel-body">
    <!-- Counter -->
    <div class="kiss-counter-card">
      <div class="kiss-count-label">Shared Kiss Balance</div>
      <div class="kiss-count-display" id="kiss-count">—</div>
      <div class="kiss-count-sub">kisses saved up 💕</div>
      <div class="kiss-counter-btns">
        <button class="kiss-adj-btn" onclick="adjustKisses(-0.5)" title="Remove half a kiss">−</button>
        <button class="kiss-set-btn" onclick="openSetKisses()">Set</button>
        <button class="kiss-adj-btn" onclick="adjustKisses(+0.5)" title="Add half a kiss">＋</button>
      </div>
    </div>
    <!-- Notices -->
    <div>

<script>
const API = "";

let modalType    = null;
let modalUser    = null;
let modalRecvId  = null;
let modalRecvMax = 0;
let users        = {};
let kissCount    = 0;

const fmt = (n) => "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 2 });

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
};

const toast = (msg, ms = 2400) => {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || "Request failed");
  }
  return res.json();
}

function updateJuneCountdown() {
  const now  = new Date();
  const year = now.getFullYear();
  let june1  = new Date(year, 5, 1);
  if (now >= june1) june1 = new Date(year + 1, 5, 1);
  document.getElementById("june-days").textContent = Math.ceil((june1 - now) / 86400000);
}
updateJuneCountdown();
setInterval(updateJuneCountdown, 60000);

// ── Day-wise Expense Rendering ────────────────────────────
function isoDateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(dateKey) {
  const t = new Date();
  const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  return dateKey === todayKey;
}

function friendlyDayLabel(dateKey) {
  const t = new Date();
  const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const yest = new Date(t); yest.setDate(t.getDate() - 1);
  const yestKey = `${yest.getFullYear()}-${String(yest.getMonth()+1).padStart(2,'0')}-${String(yest.getDate()).padStart(2,'0')}`;
  if (dateKey === todayKey) return "Today";
  if (dateKey === yestKey)  return "Yesterday";
  const d = new Date(dateKey);
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
}

function expenseItemHTML(e) {
  return `
    <div class="exp-row" id="exp-${e.id}">
      <div class="exp-dot"></div>
      <div class="exp-info">
        <div class="exp-title">${esc(e.title)}</div>
        <div class="exp-date">${fmtDate(e.created_at)}</div>
      </div>
      <div class="exp-amount">${fmt(e.amount)}</div>
      <button class="del-btn" title="Delete" onclick="deleteExpense('${e.id}','${e.user_id}')">✕</button>
    </div>`;
}

function renderExpenses(userId, list) {
  const el = document.getElementById(`expenses-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">No expenses yet ✨</p>`; return; }

  const groups = {};
  const order  = [];
  list.forEach(e => {
    const key = isoDateKey(e.created_at);
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(e);
  });

  let html = "";
  order.forEach(key => {
    const items = groups[key];
    const dayTotal = items.reduce((s, e) => s + parseFloat(e.amount), 0);

    if (isToday(key)) {
      html += `<div class="day-group open">`;
      html += `<div class="day-header" onclick="toggleDay(this)">
                 <span class="day-label">Today</span>
                 <div class="day-right">
                   <span class="day-total">${fmt(dayTotal)}</span>
                   <span class="day-chevron">▾</span>
                 </div>
               </div>`;
      html += `<div class="day-items">`;
      items.forEach(e => { html += expenseItemHTML(e); });
      html += `</div></div>`;
    } else {
      html += `<div class="day-group">`;
      html += `<div class="day-header" onclick="toggleDay(this)">
                 <span class="day-label">${esc(friendlyDayLabel(key))}</span>
                 <div class="day-right">
                   <span class="day-total">${fmt(dayTotal)}</span>
                   <span class="day-chevron">▾</span>
                 </div>
               </div>`;
      html += `<div class="day-items">`;
      items.forEach(e => { html += expenseItemHTML(e); });
      html += `</div></div>`;
    }
  });

  el.innerHTML = html;
}

function toggleDay(headerEl) {
  const group = headerEl.closest(".day-group");
  group.classList.toggle("open");
}

function renderReceivables(userId, list) {
  const el = document.getElementById(`receivables-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">Nothing to collect 🙌</p>`; return; }
  el.innerHTML = list.map(r => `
    <div class="recv-row" id="recv-${r.id}">
      <div class="recv-info">
        <div class="recv-person">👤 ${esc(r.person)}</div>
        ${r.note ? `<div class="recv-note">${esc(r.note)}</div>` : ""}
        <div class="recv-note">${fmtDate(r.created_at)}</div>
      </div>
      <div class="recv-amt">${fmt(r.amount)}</div>
      <button class="collect-btn" onclick="openCollectModal('${r.id}','${userId}',${r.amount},'${esc(r.person)}')">Collect</button>
    </div>
  `).join("");
}

function renderDebts(userId, list) {
  const el = document.getElementById(`debts-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">No pending debts 🎉</p>`; return; }
  el.innerHTML = list.map(d => `
    <div class="debt-row" id="debt-${d.id}">
      <div class="debt-info">
        <div class="debt-person">👤 ${esc(d.person)}</div>
        ${d.note ? `<div class="debt-note">${esc(d.note)}</div>` : ""}
        <div class="debt-note">${fmtDate(d.created_at)}</div>
      </div>
      <div class="debt-amt">${fmt(d.amount)}</div>
      <button class="pay-btn" id="pay-${d.id}" onclick="markPaid('${d.id}','${userId}')">✓ Paid</button>
    </div>
  `).join("");
}

function updateBalanceUI(userId) {
  const balance = users[userId]?.balance || 0;
  const balEl = document.getElementById(`balance-${userId}`);
  balEl.textContent = fmt(balance);
  balEl.classList.toggle("negative", balance < 0);
}

async function loadAll() {
  try {
    const usersArr = await api("/api/users");
    usersArr.forEach(u => { users[u.id] = u; });

    ["user1", "user2"].forEach(uid => {
      const u = users[uid];
      if (!u) return;
      document.getElementById(`name-${uid}`).textContent = u.name;
      const img = document.getElementById(`avatar-${uid}`);
      img.src = u.avatar_url || `https://api.dicebear.com/7.x/notionists/svg?seed=${uid}`;
      img.onerror = () => { img.src = `https://api.dicebear.com/7.x/notionists/svg?seed=${uid}`; };
    });

    await Promise.all(["user1", "user2"].map(async uid => {
      const [exps, recvs, debts] = await Promise.all([
        api(`/api/expenses?user_id=${uid}`),
        api(`/api/receivables?user_id=${uid}`),
        api(`/api/debts?user_id=${uid}`),
      ]);
      renderExpenses(uid, exps);
      renderReceivables(uid, recvs);
      renderDebts(uid, debts);
      updateBalanceUI(uid);
    }));
  } catch (err) {
    console.error(err);
    toast("⚠️ Failed to load data");
  }
}

// ── Kiss Bank ─────────────────────────────────────────────
function openKissPanel() {
  document.getElementById("kiss-panel").classList.add("open");
  document.getElementById("kiss-overlay").classList.add("open");
  document.getElementById("kiss-tab").classList.add("hidden");
  loadKissBank();
  loadNotices();
}

function closeKissPanel() {
  document.getElementById("kiss-panel").classList.remove("open");
  document.getElementById("kiss-overlay").classList.remove("open");
  document.getElementById("kiss-tab").classList.remove("hidden");
}

async function loadKissBank() {
  try {
    const data = await api("/api/kiss-bank");
    kissCount = data.kisses;
    const display = Number.isInteger(kissCount) ? kissCount : kissCount.toFixed(1);
    document.getElementById("kiss-count").textContent = display;
    document.getElementById("kiss-count-badge").textContent = display + " 💋";
  } catch (err) {
    toast("⚠️ Could not load kiss bank");
  }
}

async function loadNotices() {
  try {
    const list = await api("/api/notices");
    renderNotices(list);
  } catch (err) {
    toast("⚠️ Could not load notices");
  }
}

function renderNotices(list) {
  const el = document.getElementById("notices-list");
  if (!list.length) {
    el.innerHTML = `<p class="empty-msg" style="padding:10px 0">No notices yet 📭</p>`;
    return;
  }
  el.innerHTML = list.map(n => `
    <div class="notice-row" id="notice-${n.id}">
      <div class="notice-msg">
        <div>${esc(n.message)}</div>
        <div class="notice-time">${fmtDate(n.created_at)}</div>
      </div>
      <button class="notice-del-btn" onclick="deleteNotice('${n.id}')">✕</button>
    </div>
  `).join("");
}

async function addNotice() {
  const inp = document.getElementById("notice-input");
  const message = inp.value.trim();
  if (!message) { toast("⚠️ Write something first"); return; }
  try {
    await api("/api/notices", { method: "POST", body: JSON.stringify({ message }) });
    inp.value = "";
    toast("📝 Notice posted!");
    loadNotices();
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

async function deleteNotice(id) {
  try {
    await api(`/api/notices/${id}`, { method: "DELETE" });
    loadNotices();
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

async function adjustKisses(delta) {
  try {
    const data = await api("/api/kiss-bank/adjust", {
      method: "POST",
      body: JSON.stringify({ delta }),
    });
    kissCount = data.kisses;
    const display = Number.isInteger(kissCount) ? kissCount : kissCount.toFixed(1);
    document.getElementById("kiss-count").textContent = display;
    document.getElementById("kiss-count-badge").textContent = display + " 💋";
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

function openSetKisses() {
  modalType = "set-kisses";
  document.getElementById("modal-box").style.setProperty("--modal-accent", "var(--kiss)");
  document.getElementById("modal-title").textContent = "Set Kiss Balance";
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label>Number of Kisses</label>
      <input id="f-kisses" type="number" min="0" step="0.5" placeholder="0" value="${kissCount}" />
      <p class="form-hint">Decimals allowed — e.g. 2.5. Sets the shared balance directly.</p>
    </div>
  `;
  document.getElementById("modal-submit").textContent = "Save";
  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => { const i = document.getElementById("f-kisses"); if(i){i.focus();i.select();} }, 100);
}

// ── Swipe gesture ────────────────────────────────────────
let touchStartX = 0;
document.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const startedNearRight = touchStartX > window.innerWidth - 50;
  if (startedNearRight && dx < -40) openKissPanel();
}, { passive: true });

// ── Modal helpers ─────────────────────────────────────────
function openSetBalance(userId) {
  modalType = "balance";
  modalUser = userId;
  const accent = userId === "user1" ? "var(--u1)" : "var(--u2)";
  document.getElementById("modal-box").style.setProperty("--modal-accent", accent);
  const current = users[userId]?.balance || 0;
  document.getElementById("modal-title").textContent = "Set Balance";
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label>Current Balance (₹)</label>
      <input id="f-balance" type="number" placeholder="e.g. 5000" min="0" value="${current || ""}" />
      <p class="form-hint">This overwrites and sets your balance directly.</p>
    </div>
  `;
  document.getElementById("modal-submit").textContent = "Save";
  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => document.getElementById("f-balance")?.focus(), 100);
}

function openAddBalance(userId) {
  modalType = "add-balance";
  modalUser = userId;
  document.getElementById("modal-box").style.setProperty("--modal-accent", "var(--success)");
  document.getElementById("modal-title").textContent = "Add to Balance";
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label>Amount to Add (₹)</label>
      <input id="f-add-amount" type="number" placeholder="e.g. 500" min="1" />
      <p class="form-hint">This amount will be added on top of your current balance.</p>
    </div>
  `;
  document.getElementById("modal-submit").textContent = "Add";
  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => document.getElementById("f-add-amount")?.focus(), 100);
}

function openCollectModal(recvId, userId, fullAmount, person) {
  modalType    = "collect";
  modalUser    = userId;
  modalRecvId  = recvId;
  modalRecvMax = fullAmount;
  document.getElementById("modal-box").style.setProperty("--modal-accent", "var(--teal)");
  document.getElementById("modal-title").textContent = `Collect from ${person}`;
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label>Amount Received (₹)</label>
      <input id="f-collect-amount" type="number" placeholder="0" min="1" max="${fullAmount}" value="${fullAmount}" />
      <p class="form-hint">Total pending: ${fmt(fullAmount)}. Change the amount if you only received part of it — the rest stays in the list.</p>
    </div>
  `;
  document.getElementById("modal-submit").textContent = "Collect";
  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => {
    const inp = document.getElementById("f-collect-amount");
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
}

function openModal(type, userId) {
  modalType = type;
  modalUser = userId;
  const accent = userId === "user1" ? "var(--u1)" : "var(--u2)";
  document.getElementById("modal-box").style.setProperty("--modal-accent", accent);
  document.getElementById("modal-submit").textContent = "Add";

  if (type === "expense") {
    document.getElementById("modal-title").textContent = "Add Expense";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>Title</label>
        <input id="f-title" type="text" placeholder="e.g. Lunch, Shoes…" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="f-date" type="date" value="${todayISO()}" />
      </div>
    `;
  } else if (type === "receivable") {
    document.getElementById("modal-box").style.setProperty("--modal-accent", "var(--teal)");
    document.getElementById("modal-title").textContent = "Money to Get";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>From (Person)</label>
        <input id="f-person" type="text" placeholder="Who owes you?" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="f-note" placeholder="What's it for?"></textarea>
      </div>
    `;
  } else {
    document.getElementById("modal-title").textContent = "Add Debt";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>Person</label>
        <input id="f-person" type="text" placeholder="Who do you owe?" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="f-note" placeholder="What's it for?"></textarea>
      </div>
    `;
  }

  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => document.querySelector("#modal-body input")?.focus(), 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-backdrop")) return;
  document.getElementById("modal-backdrop").style.display = "none";
}

async function submitModal() {
  const btn = document.getElementById("modal-submit");
  btn.disabled = true;

  try {
    if (modalType === "balance") {
      const amount = parseFloat(document.getElementById("f-balance")?.value);
      if (isNaN(amount) || amount < 0) throw new Error("Please enter a valid amount");
      await api(`/api/users/${modalUser}`, {
        method: "PATCH",
        body: JSON.stringify({ balance: amount }),
      });
      users[modalUser].balance = amount;
      toast("Balance saved!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "add-balance") {
      const amount = parseFloat(document.getElementById("f-add-amount")?.value);
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      await api(`/api/users/${modalUser}/add-balance`, {
        method: "POST",
        body: JSON.stringify({ amount }),
      });
      toast("Balance updated!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "collect") {
      const amount = parseFloat(document.getElementById("f-collect-amount")?.value);
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      if (amount > modalRecvMax) throw new Error(`Cannot collect more than ${fmt(modalRecvMax)}`);
      const res = await api(`/api/receivables/${modalRecvId}/collect`, {
        method: "POST",
        body: JSON.stringify({ amount }),
      });
      const remaining = res.remaining || 0;
      toast(remaining > 0
        ? `Collected ${fmt(amount)} — ${fmt(remaining)} still pending`
        : "Fully collected & added to balance!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "expense") {
      const title  = document.getElementById("f-title")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const date   = document.getElementById("f-date")?.value;
      if (!title)                 throw new Error("Please enter a title");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      const created_at = date ? new Date(date).toISOString() : new Date().toISOString();
      await api("/api/expenses", {
        method: "POST",
        body: JSON.stringify({ title, amount, user_id: modalUser, created_at }),
      });
      toast("Expense added!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "receivable") {
      const person = document.getElementById("f-person")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const note   = document.getElementById("f-note")?.value.trim();
      if (!person)                throw new Error("Please enter a person name");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      await api("/api/receivables", {
        method: "POST",
        body: JSON.stringify({ person, amount, note, user_id: modalUser }),
      });
      toast("Added to Money to Get!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "set-kisses") {
      const kisses = parseFloat(document.getElementById("f-kisses")?.value);
      if (isNaN(kisses) || kisses < 0) throw new Error("Please enter a valid number");
      await api("/api/kiss-bank/set", {
        method: "POST",
        body: JSON.stringify({ kisses }),
      });
      kissCount = kisses;
      const display = Number.isInteger(kissCount) ? kissCount : kissCount.toFixed(1);
      document.getElementById("kiss-count").textContent = display;
      document.getElementById("kiss-count-badge").textContent = display + " 💋";
      toast("Kiss balance saved!");
      document.getElementById("modal-backdrop").style.display = "none";

    } else {
      const person = document.getElementById("f-person")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const note   = document.getElementById("f-note")?.value.trim();
      if (!person)                throw new Error("Please enter a person name");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      await api("/api/debts", {
        method: "POST",
        body: JSON.stringify({ person, amount, note, user_id: modalUser }),
      });
      toast("Debt added!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();
    }

  } catch (err) {
    toast("⚠️ " + err.message);
  } finally {
    btn.disabled = false;
  }
}

async function deleteExpense(id, userId) {
  if (!confirm("Delete this expense?")) return;
  try {
    await api(`/api/expenses/${id}`, { method: "DELETE" });
    toast("Deleted");
    await loadAll();
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

async function markPaid(debtId, userId) {
  const btn = document.getElementById(`pay-${debtId}`);
  if (btn) btn.disabled = true;
  try {
    await api(`/api/debts/${debtId}/pay`, { method: "POST" });
    toast("Marked paid & deducted from balance!");
    await loadAll();
  } catch (err) {
    toast("⚠️ " + err.message);
    if (btn) btn.disabled = false;
  }
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.getElementById("modal-backdrop").style.display = "none";
    closeKissPanel();
  }
});

loadAll();
loadKissBank();
</script>
