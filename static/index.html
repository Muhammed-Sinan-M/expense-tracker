<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>💑 Our Expenses</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f4f1ee;
    --card:      #ffffff;
    --border:    #e8e3dc;
    --indigo:    #5b5bd6;
    --indigo-lt: #ededfb;
    --pink:      #e05c8a;
    --pink-lt:   #fde8f1;
    --text:      #1a1a2e;
    --muted:     #8a8799;
    --success:   #2e9e6b;
    --danger:    #e05c5c;
    --teal:      #2b9e8e;
    --teal-lt:   #e0f5f3;
    --shadow:    0 2px 16px rgba(0,0,0,.07);
    --radius:    18px;
    --radius-sm: 10px;
    --u1: var(--indigo);
    --u1-lt: var(--indigo-lt);
    --u2: var(--pink);
    --u2-lt: var(--pink-lt);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--text); }
  .topbar h1 span { color: var(--pink); }

  .june-banner {
    background: linear-gradient(135deg, #fff8f0 0%, #fde8f1 100%);
    border-bottom: 1px solid #f0dde8;
    padding: 8px 20px;
    text-align: center;
    font-size: .78rem;
    color: var(--muted);
  }
  .june-banner strong {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--pink);
    margin: 0 3px;
  }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
  }
  @media (min-width: 700px) {
    .main { grid-template-columns: 1fr 1fr; gap: 28px; }
  }

  .user-section { display: flex; flex-direction: column; gap: 14px; }

  .profile-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--accent);
  }
  .user-section[data-user="user1"] .profile-card { --accent: var(--u1); }
  .user-section[data-user="user2"] .profile-card { --accent: var(--u2); }

  .profile-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    flex-shrink: 0;
  }
  .profile-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
  }

  .balance-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-lt);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .user-section[data-user="user1"] .balance-row { --accent-lt: var(--u1-lt); }
  .user-section[data-user="user2"] .balance-row { --accent-lt: var(--u2-lt); }

  .balance-label {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .09em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .balance-amount {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .balance-amount.negative { color: var(--danger); }

  .set-balance-btn {
    background: none;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  .set-balance-btn:hover { background: var(--accent); color: #fff; }

  .block {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 18px 9px;
    border-bottom: 1px solid var(--border);
  }
  .block-title {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .add-btn {
    background: var(--accent-lt);
    color: var(--accent);
    border: none;
    border-radius: 99px;
    padding: 5px 13px;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-btn:hover { filter: brightness(.92); }
  .user-section[data-user="user1"] .add-btn { --accent: var(--u1); --accent-lt: var(--u1-lt); }
  .user-section[data-user="user2"] .add-btn { --accent: var(--u2); --accent-lt: var(--u2-lt); }

  .item-list { padding: 4px 0; min-height: 40px; }
  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: .82rem;
    padding: 16px 10px;
  }

  .exp-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .exp-row:last-child { border-bottom: none; }
  .exp-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .user-section[data-user="user1"] .exp-dot { --accent: var(--u1); }
  .user-section[data-user="user2"] .exp-dot { --accent: var(--u2); }
  .exp-info { flex: 1; min-width: 0; }
  .exp-title { font-weight: 500; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-date { font-size: .7rem; color: var(--muted); margin-top: 1px; }
  .exp-amount { font-weight: 600; font-size: .95rem; white-space: nowrap; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: .95rem; padding: 0 2px;
    transition: color .15s; line-height: 1;
  }
  .del-btn:hover { color: var(--danger); }

  .recv-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .recv-row:last-child { border-bottom: none; }
  .recv-info { flex: 1; min-width: 0; }
  .recv-person { font-weight: 600; font-size: .88rem; }
  .recv-note { font-size: .7rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recv-amt { font-weight: 600; font-size: .93rem; color: var(--teal); white-space: nowrap; }

  .debt-row {
    display: flex; align-items: center;
    padding: 10px 18px; gap: 12px;
    border-bottom: 1px solid #f5f3f0;
    animation: fadeIn .22s ease;
  }
  .debt-row:last-child { border-bottom: none; }
  .debt-info { flex: 1; min-width: 0; }
  .debt-person { font-weight: 600; font-size: .88rem; }
  .debt-note { font-size: .7rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .debt-amt { font-weight: 600; font-size: .93rem; color: var(--pink); white-space: nowrap; }
  .pay-btn {
    background: #e8f9f1; color: var(--success);
    border: none; border-radius: 99px;
    padding: 5px 11px; font-size: .73rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
    font-family: 'DM Sans', sans-serif; white-space: nowrap;
  }
  .pay-btn:hover { background: #d1f5e4; }
  .pay-btn:disabled { opacity: .5; cursor: not-allowed; }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(20,18,40,.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .18s ease;
  }
  @media (min-width: 600px) { .modal-backdrop { align-items: center; } }
  .modal {
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 26px 22px 32px;
    width: 100%; max-width: 420px;
    box-shadow: 0 -8px 40px rgba(0,0,0,.12);
    animation: slideUp .22s ease;
  }
  @media (min-width: 600px) { .modal { border-radius: var(--radius); animation: fadeIn .18s ease; } }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 18px; }
  .form-group { margin-bottom: 13px; }
  .form-group label {
    display: block; font-size: .75rem; font-weight: 600;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 5px;
  }
  .form-group input, .form-group textarea {
    width: 100%; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: .95rem; font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    transition: border-color .15s; outline: none;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--modal-accent, var(--indigo)); }
  .form-group textarea { resize: none; height: 68px; }
  .form-hint { font-size: .74rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary {
    flex: 1; background: var(--modal-accent, var(--indigo));
    color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 12px; font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .15s;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-secondary {
    background: var(--bg); color: var(--muted);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 18px; font-size: .95rem; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  #toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text); color: #fff;
    padding: 10px 22px; border-radius: 99px;
    font-size: .86rem; font-weight: 500; z-index: 999;
    transition: transform .3s ease, opacity .3s;
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .skeleton {
    background: linear-gradient(90deg, #ece9e4 25%, #f5f3f0 50%, #ece9e4 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px; height: 13px; margin: 8px 18px;
  }

  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
</style>
</head>
<body>

<div class="topbar">
  <h1>Our <span>Expenses</span></h1>
</div>

<div class="june-banner">
  🗓 <strong id="june-days">—</strong> days left
</div>

<div class="main">

  <!-- ── USER 1 ── -->
  <div class="user-section" data-user="user1">
    <div class="profile-card">
      <div class="profile-top">
        <img class="avatar" id="avatar-user1" src="" alt="User 1" />
        <div>
          <div class="profile-name" id="name-user1">—</div>
        </div>
      </div>
      <div class="balance-row">
        <div>
          <div class="balance-label">Balance</div>
          <div class="balance-amount" id="balance-user1">₹0</div>
        </div>
        <button class="set-balance-btn" onclick="openSetBalance('user1')">✏ Set Balance</button>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💳 Expenses</span>
        <button class="add-btn" onclick="openModal('expense','user1')">+ Add</button>
      </div>
      <div class="item-list" id="expenses-user1">
        <div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💰 Money to Get</span>
        <button class="add-btn" onclick="openModal('receivable','user1')">+ Add</button>
      </div>
      <div class="item-list" id="receivables-user1">
        <div class="skeleton"></div>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💸 Debts</span>
        <button class="add-btn" onclick="openModal('debt','user1')">+ Add</button>
      </div>
      <div class="item-list" id="debts-user1">
        <div class="skeleton"></div>
      </div>
    </div>
  </div>

  <!-- ── USER 2 ── -->
  <div class="user-section" data-user="user2">
    <div class="profile-card">
      <div class="profile-top">
        <img class="avatar" id="avatar-user2" src="" alt="User 2" />
        <div>
          <div class="profile-name" id="name-user2">—</div>
        </div>
      </div>
      <div class="balance-row">
        <div>
          <div class="balance-label">Balance</div>
          <div class="balance-amount" id="balance-user2">₹0</div>
        </div>
        <button class="set-balance-btn" onclick="openSetBalance('user2')">✏ Set Balance</button>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💳 Expenses</span>
        <button class="add-btn" onclick="openModal('expense','user2')">+ Add</button>
      </div>
      <div class="item-list" id="expenses-user2">
        <div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💰 Money to Get</span>
        <button class="add-btn" onclick="openModal('receivable','user2')">+ Add</button>
      </div>
      <div class="item-list" id="receivables-user2">
        <div class="skeleton"></div>
      </div>
    </div>

    <div class="block">
      <div class="block-header">
        <span class="block-title">💸 Debts</span>
        <button class="add-btn" onclick="openModal('debt','user2')">+ Add</button>
      </div>
      <div class="item-list" id="debts-user2">
        <div class="skeleton"></div>
      </div>
    </div>
  </div>

</div>

<div class="modal-backdrop" id="modal-backdrop" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">Add</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-submit" onclick="submitModal()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = "";

let modalType = null;
let modalUser = null;
let users     = {};

const fmt = (n) => "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 2 });

const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
};

const toast = (msg, ms = 2400) => {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
};

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || "Request failed");
  }
  return res.json();
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updateJuneCountdown() {
  const now  = new Date();
  const year = now.getFullYear();
  let june1  = new Date(year, 5, 1);
  if (now >= june1) june1 = new Date(year + 1, 5, 1);
  document.getElementById("june-days").textContent = Math.ceil((june1 - now) / 86400000);
}
updateJuneCountdown();
setInterval(updateJuneCountdown, 60000);

function renderExpenses(userId, list) {
  const el = document.getElementById(`expenses-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">No expenses yet ✨</p>`; return; }
  el.innerHTML = list.map(e => `
    <div class="exp-row" id="exp-${e.id}">
      <div class="exp-dot"></div>
      <div class="exp-info">
        <div class="exp-title">${esc(e.title)}</div>
        <div class="exp-date">${fmtDate(e.created_at)}</div>
      </div>
      <div class="exp-amount">${fmt(e.amount)}</div>
      <button class="del-btn" title="Delete" onclick="deleteExpense('${e.id}','${userId}')">✕</button>
    </div>
  `).join("");
}

function renderReceivables(userId, list) {
  const el = document.getElementById(`receivables-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">Nothing to collect 🙌</p>`; return; }
  el.innerHTML = list.map(r => `
    <div class="recv-row" id="recv-${r.id}">
      <div class="recv-info">
        <div class="recv-person">👤 ${esc(r.person)}</div>
        ${r.note ? `<div class="recv-note">${esc(r.note)}</div>` : ""}
        <div class="recv-note">${fmtDate(r.created_at)}</div>
      </div>
      <div class="recv-amt">${fmt(r.amount)}</div>
      <button class="del-btn" title="Collected" onclick="deleteReceivable('${r.id}','${userId}')">✕</button>
    </div>
  `).join("");
}

function renderDebts(userId, list) {
  const el = document.getElementById(`debts-${userId}`);
  if (!list.length) { el.innerHTML = `<p class="empty-msg">No pending debts 🎉</p>`; return; }
  el.innerHTML = list.map(d => `
    <div class="debt-row" id="debt-${d.id}">
      <div class="debt-info">
        <div class="debt-person">👤 ${esc(d.person)}</div>
        ${d.note ? `<div class="debt-note">${esc(d.note)}</div>` : ""}
        <div class="debt-note">${fmtDate(d.created_at)}</div>
      </div>
      <div class="debt-amt">${fmt(d.amount)}</div>
      <button class="pay-btn" id="pay-${d.id}" onclick="markPaid('${d.id}','${userId}')">✓ Paid</button>
    </div>
  `).join("");
}

function updateBalanceUI(userId) {
  const balance = users[userId]?.balance || 0;
  const balEl = document.getElementById(`balance-${userId}`);
  balEl.textContent = fmt(balance);
  balEl.classList.toggle("negative", balance < 0);
}

async function loadAll() {
  try {
    const usersArr = await api("/api/users");
    usersArr.forEach(u => { users[u.id] = u; });

    ["user1", "user2"].forEach(uid => {
      const u = users[uid];
      if (!u) return;
      document.getElementById(`name-${uid}`).textContent = u.name;
      const img = document.getElementById(`avatar-${uid}`);
      img.src = u.avatar_url || `https://api.dicebear.com/7.x/notionists/svg?seed=${uid}`;
      img.onerror = () => { img.src = `https://api.dicebear.com/7.x/notionists/svg?seed=${uid}`; };
    });

    await Promise.all(["user1", "user2"].map(async uid => {
      const [exps, recvs, debts] = await Promise.all([
        api(`/api/expenses?user_id=${uid}`),
        api(`/api/receivables?user_id=${uid}`),
        api(`/api/debts?user_id=${uid}`),
      ]);
      renderExpenses(uid, exps);
      renderReceivables(uid, recvs);
      renderDebts(uid, debts);
      updateBalanceUI(uid);
    }));
  } catch (err) {
    console.error(err);
    toast("⚠️ Failed to load data");
  }
}

function openSetBalance(userId) {
  modalType = "balance";
  modalUser = userId;
  const accent = userId === "user1" ? "var(--u1)" : "var(--u2)";
  document.getElementById("modal-box").style.setProperty("--modal-accent", accent);
  const current = users[userId]?.balance || 0;
  document.getElementById("modal-title").textContent = "Set Balance";
  document.getElementById("modal-body").innerHTML = `
    <div class="form-group">
      <label>Current Balance (₹)</label>
      <input id="f-balance" type="number" placeholder="e.g. 5000" min="0" value="${current || ""}" />
      <p class="form-hint">This sets your balance directly in Supabase.</p>
    </div>
  `;
  document.getElementById("modal-submit").textContent = "Save";
  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => document.getElementById("f-balance")?.focus(), 100);
}

function openModal(type, userId) {
  modalType = type;
  modalUser = userId;
  const accent = userId === "user1" ? "var(--u1)" : "var(--u2)";
  document.getElementById("modal-box").style.setProperty("--modal-accent", accent);
  document.getElementById("modal-submit").textContent = "Add";

  if (type === "expense") {
    document.getElementById("modal-title").textContent = "Add Expense";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>Title</label>
        <input id="f-title" type="text" placeholder="e.g. Lunch, Shoes…" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input id="f-date" type="date" value="${todayISO()}" />
      </div>
    `;
  } else if (type === "receivable") {
    document.getElementById("modal-box").style.setProperty("--modal-accent", "var(--teal)");
    document.getElementById("modal-title").textContent = "Money to Get";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>From (Person)</label>
        <input id="f-person" type="text" placeholder="Who owes you?" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="f-note" placeholder="What's it for?"></textarea>
      </div>
    `;
  } else {
    document.getElementById("modal-title").textContent = "Add Debt";
    document.getElementById("modal-body").innerHTML = `
      <div class="form-group">
        <label>Person</label>
        <input id="f-person" type="text" placeholder="Who do you owe?" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input id="f-amount" type="number" placeholder="0" min="1" />
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="f-note" placeholder="What's it for?"></textarea>
      </div>
    `;
  }

  document.getElementById("modal-backdrop").style.display = "flex";
  setTimeout(() => document.querySelector("#modal-body input")?.focus(), 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modal-backdrop")) return;
  document.getElementById("modal-backdrop").style.display = "none";
}

async function submitModal() {
  const btn = document.getElementById("modal-submit");
  btn.disabled = true;

  try {
    if (modalType === "balance") {
      const amount = parseFloat(document.getElementById("f-balance")?.value);
      if (isNaN(amount) || amount < 0) throw new Error("Please enter a valid amount");
      await api(`/api/users/${modalUser}`, {
        method: "PATCH",
        body: JSON.stringify({ balance: amount }),
      });
      users[modalUser].balance = amount;
      toast("✅ Balance saved!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "expense") {
      const title  = document.getElementById("f-title")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const date   = document.getElementById("f-date")?.value;
      if (!title)                 throw new Error("Please enter a title");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      const created_at = date ? new Date(date).toISOString() : new Date().toISOString();
      await api("/api/expenses", {
        method: "POST",
        body: JSON.stringify({ title, amount, user_id: modalUser, created_at }),
      });
      toast("✅ Expense added!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else if (modalType === "receivable") {
      const person = document.getElementById("f-person")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const note   = document.getElementById("f-note")?.value.trim();
      if (!person)                throw new Error("Please enter a person name");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      await api("/api/receivables", {
        method: "POST",
        body: JSON.stringify({ person, amount, note, user_id: modalUser }),
      });
      toast("✅ Added to Money to Get!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();

    } else {
      const person = document.getElementById("f-person")?.value.trim();
      const amount = parseFloat(document.getElementById("f-amount")?.value);
      const note   = document.getElementById("f-note")?.value.trim();
      if (!person)                throw new Error("Please enter a person name");
      if (!amount || amount <= 0) throw new Error("Please enter a valid amount");
      await api("/api/debts", {
        method: "POST",
        body: JSON.stringify({ person, amount, note, user_id: modalUser }),
      });
      toast("✅ Debt added!");
      document.getElementById("modal-backdrop").style.display = "none";
      await loadAll();
    }

  } catch (err) {
    toast("⚠️ " + err.message);
  } finally {
    btn.disabled = false;
  }
}

async function deleteExpense(id, userId) {
  if (!confirm("Delete this expense?")) return;
  try {
    await api(`/api/expenses/${id}`, { method: "DELETE" });
    toast("🗑 Deleted");
    await loadAll();
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

async function deleteReceivable(id, userId) {
  if (!confirm("Mark as collected?")) return;
  try {
    await api(`/api/receivables/${id}`, { method: "DELETE" });
    toast("💰 Collected & added to balance!");
    await loadAll();
  } catch (err) {
    toast("⚠️ " + err.message);
  }
}

async function markPaid(debtId, userId) {
  const btn = document.getElementById(`pay-${debtId}`);
  if (btn) btn.disabled = true;
  try {
    await api(`/api/debts/${debtId}/pay`, { method: "POST" });
    toast("🎉 Marked paid & deducted from balance!");
    await loadAll();
  } catch (err) {
    toast("⚠️ " + err.message);
    if (btn) btn.disabled = false;
  }
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("modal-backdrop").style.display = "none";
});

loadAll();
</script>
</body>
</html>
